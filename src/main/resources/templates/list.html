<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<h2>Danh sach HotWheel</h2>

<form method="get" th:action="@{/spacecraft}">
    <input type="text" name="keyword" th:value="${keyword}"
           class="form-control" aria-describedby="helpId" placeholder="Search">
    <button type="submit" class="btn btn-primary">Submit</button>
</form>

<a th:href="@{/spacecraft/create}" class="btn btn-success mb-3">+ Thêm mới</a>

<table class="table table-striped table-inverse ">
    <thead class="thead-inverse">
    <tr>
        <th>Name</th>
        <th>Series</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${list.content}">
        <td scope="row" th:text="${s.name}"></td>
        <td th:text="${s.series}"></td>
        <td th:text="${#temporals.format(s.date, 'dd/MM/yyyy')}"></td>
        <td>
            <a class="btn btn-warning" th:href="@{/spacecraft/edit/{id}(id=${s.id})}" role="button">Edit</a>
            <a class="btn btn-danger" th:href="@{/spacecraft/delete/{id}(id=${s.id})}" role="button" onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<div class="text-center">
    <a th:if="${list.hasPrevious()}" th:href="@{/spacecraft(page=${list.number - 1}, keyword=${keyword})}">Prev</a>
    <a th:if="${list.hasNext()}" th:href="@{/spacecraft(page=${list.number + 1}, keyword=${keyword})}">Next</a>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
